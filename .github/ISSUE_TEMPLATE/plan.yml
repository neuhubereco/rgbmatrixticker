name: "🗺️ Plan / Meilenstein"
description: "Mehrteiliges Vorhaben mit Plan-Datei im Repo"
labels: ["plan"]
body:
  - type: textarea
    id: ziel
    attributes:
      label: Ziel
      description: Was soll am Ende stehen? 1–3 Sätze.
    validations:
      required: true
  - type: input
    id: plandatei
    attributes:
      label: Plan-Datei
      description: Pfad zur committeten Plan-Datei
      placeholder: "docs/plans/2026-07-15-thema.md"
  - type: textarea
    id: teilschritte
    attributes:
      label: Teilschritte
      description: Unabhängig verifizierbare Schritte; werden ggf. eigene To-do-Issues.
      placeholder: |
        - [ ] …
        - [ ] …
    validations:
      required: true
  - type: textarea
    id: risiken
    attributes:
      label: Risiken / offene Fragen
